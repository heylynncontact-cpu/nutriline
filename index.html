<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#059669" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="NutriLine" />
  <meta name="description" content="Journal alimentaire — NutriLine" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="icon" type="image/png" href="icons/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
  <title>NutriLine</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="app">

    <!-- HEADER -->
    <header class="topbar">
      <div class="brand">
        <svg class="brand-leaf" width="22" height="22" viewBox="0 0 24 24" fill="none">
          <path d="M6 18C6 10 11 5 19 5c0 8-5 13-13 13z" fill="#059669"/>
          <path d="M6 18C9 14 12 11 16 8" stroke="#fff" stroke-width="1.6" stroke-linecap="round"/>
          <path d="M6 18l-2 2.5" stroke="#059669" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
        <span class="brand-name">NutriLine</span>
      </div>
      <button class="icon-btn" id="notif-btn" aria-label="Rappels collation">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
      </button>
    </header>

    <!-- SCREENS -->
    <main id="main">

      <!-- AUJOURD'HUI (timeline) -->
      <section id="screen-today" class="screen active">
        <div class="day-head">
          <h1 id="today-title">Aujourd'hui</h1>
          <p id="today-sub"></p>
        </div>
        <div class="timeline" id="timeline"></div>

        <div class="pad-x">
          <div class="soft-card activity-card">
            <div class="row-between">
              <div>
                <div class="card-t">Activité physique</div>
                <div class="card-s" id="activity-sub">Pas encore aujourd'hui</div>
              </div>
              <button class="switch" id="activity-toggle" aria-pressed="false"></button>
            </div>
            <input type="text" id="activity-input" class="input hidden" placeholder="Ringfit, marche, Pilates…" />
          </div>

          <div class="soft-card">
            <div class="card-t" style="margin-bottom:8px">Note du jour</div>
            <textarea id="global-note" class="input" rows="2" placeholder="Énergie, humeur, contexte…"></textarea>
          </div>
        </div>
        <div class="nav-spacer"></div>
      </section>

      <!-- PLAN -->
      <section id="screen-plan" class="screen">
        <div class="day-head">
          <h1>Mon plan</h1>
          <p>Julie Havez · diététicienne nutritionniste</p>
        </div>
        <div id="plan-content" class="pad-x"></div>
        <div class="nav-spacer"></div>
      </section>

      <!-- HISTORIQUE -->
      <section id="screen-history" class="screen">
        <div class="day-head row-between">
          <div>
            <h1>Historique</h1>
            <p id="cal-streak-sub"></p>
          </div>
          <button class="pill-btn" id="open-export">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><polyline points="9 15 12 18 15 15"/></svg>
            PDF
          </button>
        </div>

        <div class="pad-x">
          <div class="soft-card cal-card">
            <div class="cal-nav">
              <button class="cal-arrow" id="cal-prev" aria-label="Mois précédent">‹</button>
              <div class="cal-month" id="cal-month"></div>
              <button class="cal-arrow" id="cal-next" aria-label="Mois suivant">›</button>
            </div>
            <div class="cal-grid cal-head">
              <span>L</span><span>M</span><span>M</span><span>J</span><span>V</span><span>S</span><span>D</span>
            </div>
            <div class="cal-grid" id="cal-days"></div>
          </div>
        </div>

        <div class="pad-x" id="day-detail"></div>
        <div class="nav-spacer"></div>
      </section>

      <!-- STATS -->
      <section id="screen-stats" class="screen">
        <div class="day-head">
          <h1>Stats</h1>
          <p>Ta régularité sur les 30 derniers jours</p>
        </div>
        <div class="pad-x" id="stats-content"></div>
        <div class="nav-spacer"></div>
      </section>

      <!-- EXPORT (sheet-triggered screen) -->
      <section id="screen-export" class="screen">
        <div class="day-head">
          <h1>Export PDF</h1>
          <p>À envoyer à Julie Havez</p>
        </div>
        <div class="pad-x">
          <div class="soft-card">
            <div class="card-t" style="margin-bottom:10px">Période</div>
            <div class="row-between" style="margin-bottom:8px">
              <label class="lbl">Du</label>
              <input type="date" id="export-from" class="input date-input" />
            </div>
            <div class="row-between">
              <label class="lbl">Au</label>
              <input type="date" id="export-to" class="input date-input" />
            </div>
            <div class="chip-row" id="quick-ranges"></div>
          </div>
          <div class="soft-card">
            <div class="card-t" style="margin-bottom:8px">Inclure</div>
            <div id="export-options"></div>
          </div>
          <div class="soft-card" id="export-preview" style="display:none"></div>
          <button class="primary-btn" id="generate-pdf">Générer le PDF</button>
        </div>
        <div class="nav-spacer"></div>
      </section>

    </main>

    <!-- BOTTOM NAV -->
    <nav class="bottom-nav">
      <button class="nav-btn active" data-screen="today">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15.5 14"/></svg>
        <span>Aujourd'hui</span>
      </button>
      <button class="nav-btn" data-screen="plan">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        <span>Plan</span>
      </button>
      <button class="nav-btn" data-screen="history">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        <span>Historique</span>
      </button>
      <button class="nav-btn" data-screen="stats">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        <span>Stats</span>
      </button>
    </nav>

    <!-- ENTRY SHEET -->
    <div class="overlay" id="overlay"></div>
    <div class="sheet" id="entry-sheet" aria-hidden="true">
      <div class="sheet-grip"></div>
      <div class="sheet-head">
        <div class="sheet-title" id="sheet-title">Repas</div>
        <button class="icon-btn small" id="sheet-close" aria-label="Fermer">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="sheet-body">
        <div class="row-between" style="margin-bottom:12px">
          <label class="lbl">Heure</label>
          <input type="time" id="sheet-time" class="input date-input" />
        </div>
        <label class="lbl-block">Ce que j'ai mangé</label>
        <textarea id="sheet-text" class="input" rows="3" placeholder="Décris ton repas…"></textarea>
        <label class="lbl-block" style="margin-top:12px">Commentaire <span class="lbl-opt">(optionnel)</span></label>
        <textarea id="sheet-note" class="input" rows="2" placeholder="Nouvel aliment, envie, contexte…"></textarea>
        <div class="sheet-actions">
          <button class="ghost-btn danger hidden" id="sheet-delete">Effacer</button>
          <button class="primary-btn" id="sheet-save">Enregistrer</button>
        </div>
      </div>
    </div>

    <!-- DAY DETAIL SHEET (history) -->
    <div class="sheet" id="day-sheet" aria-hidden="true">
      <div class="sheet-grip"></div>
      <div class="sheet-head">
        <div class="sheet-title" id="day-sheet-title"></div>
        <button class="icon-btn small" id="day-sheet-close" aria-label="Fermer">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="sheet-body" id="day-sheet-body"></div>
    </div>

    <div class="toast" id="toast" role="alert" aria-live="polite"></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="js/data.js"></script>
  <script src="js/state.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/export.js"></script>
  <script src="js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(() => {}));
    }
  </script>
</body>
</html>
